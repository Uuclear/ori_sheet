<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>任务导航 - 环刀法压实度检测</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="bg-slate-100 min-h-screen">
  <header class="bg-blue-800 text-white px-6 py-4 shadow">
    <div class="max-w-[1400px] mx-auto flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="text-xl font-bold">环刀法压实度检测</h1>
        <p class="text-blue-200 text-sm mt-1">任务导航 · 按委托单编号查询 LIMIS 任务</p>
      </div>
      <nav id="main-nav" class="flex gap-2"></nav>
    </div>
  </header>

  <main class="max-w-[1400px] mx-auto p-4 space-y-4">
    <section class="bg-white rounded-lg shadow p-4">
      <h2 class="text-lg font-semibold text-slate-800 mb-3 border-b pb-2">查询任务</h2>
      <div class="flex flex-wrap gap-3 mb-3">
        <div class="flex-1 min-w-[240px]">
          <label class="text-xs text-slate-500 block mb-1">委托单编号（模糊匹配）</label>
          <input id="entrust_keyword" type="text" placeholder="输入委托编号关键词，如 LJ01 或 LJ01-260364"
            class="w-full border rounded px-3 py-2 text-sm" />
        </div>
        <div class="flex items-end gap-2">
          <button id="btn-query-tasks" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded text-sm font-medium">查询任务</button>
        </div>
      </div>
      <p class="text-xs text-slate-400 mb-2">
        通过 LIMIS 任务管理接口按 <strong>委托单编号 testingOrderNo</strong> 模糊查询。
        输入编号的一部分即可，例如 <code class="bg-slate-100 px-1 rounded">LJ01</code>（匹配 LJ01-260364 等）、<code class="bg-slate-100 px-1 rounded">LJ01-26</code>。
      </p>
      <span id="query-status" class="text-sm text-slate-500"></span>
    </section>

    <section class="bg-white rounded-lg shadow p-4 overflow-x-auto">
      <h2 class="text-lg font-semibold text-slate-800 mb-3">任务列表</h2>
      <table class="data-table w-full text-sm">
        <thead>
          <tr>
            <th>任务编号</th>
            <th>委托编号</th>
            <th>样品名称</th>
            <th>工程名称</th>
            <th>任务名称</th>
            <th>部门</th>
            <th>状态</th>
            <th>执行人</th>
            <th>剩余天数</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="task-tbody">
          <tr><td colspan="10" class="text-slate-400 py-8">输入委托单编号关键词后点击「查询任务」</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/tasks.js"></script>
</body>
</html>
