<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设置 - 环刀法压实度检测</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="bg-slate-100 min-h-screen">
  <header class="bg-blue-800 text-white px-6 py-4 shadow">
    <div class="max-w-[800px] mx-auto flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="text-xl font-bold">环刀法压实度检测</h1>
        <p class="text-blue-200 text-sm mt-1">LIMIS 系统连接设置</p>
      </div>
      <nav id="main-nav" class="flex gap-2"></nav>
    </div>
  </header>

  <main class="max-w-[800px] mx-auto p-4">
    <section class="bg-white rounded-lg shadow p-6 space-y-4">
      <h2 class="text-lg font-semibold text-slate-800 border-b pb-2">LIMIS 登录配置</h2>

      <div>
        <label class="text-sm text-slate-600 block mb-1">服务器地址</label>
        <input id="base_url" type="url" placeholder="http://10.1.228.22"
          class="w-full border rounded px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="text-sm text-slate-600 block mb-1">用户名（手机号或工号）</label>
        <input id="username" type="text" autocomplete="username"
          class="w-full border rounded px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="text-sm text-slate-600 block mb-1">密码</label>
        <input id="password" type="password" autocomplete="current-password"
          placeholder="留空则保持原密码不变"
          class="w-full border rounded px-3 py-2 text-sm" />
        <p id="password-hint" class="text-xs text-slate-400 mt-1"></p>
      </div>

      <div class="flex flex-wrap gap-3 pt-2">
        <button id="btn-save" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-medium">保存设置</button>
        <button id="btn-test" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded">测试登录</button>
      </div>

      <div id="test-result" class="text-sm text-slate-600 hidden"></div>
    </section>

    <p class="text-xs text-slate-400 mt-4 text-center">
      设置保存在本地服务器 data/app_settings.json，仅用于连接内网 LIMIS 系统。
    </p>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/settings.js"></script>
</body>
</html>
